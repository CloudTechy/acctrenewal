version: '3.8'

# Staging Docker Compose configuration
# Usage: docker-compose -f docker-compose.staging.yml up -d

services:
  # Next.js Application (Staging)
  acctrenewal-app:
    image: cloudtechy/acctrenewal:staging
    build:
      context: .
      dockerfile: Dockerfile
      pull_policy: always
      args:
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY}
        PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
    container_name: acctrenewal-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

    # Load environment variables from .env.staging file
    env_file:
      - .env.staging

    # Mount volume for logs (optional)
    volumes:
      - ./logs:/app/logs:rw

    networks:
      - acctrenewal-network

    # --- SECURITY HARDENING ---
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/.next/cache:size=100M
    cap_drop:
      - ALL
    # ---------------------------

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # Webhook Deployment Server (Dockerized) - enable with --profile vps
  acctrenewal-webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: acctrenewal-webhook
    restart: unless-stopped
    profiles:
      - vps
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .webhook.env
    environment:
      - PORT=3001
      - APP_DIR=/app
      - DOCKER_COMPOSE_FILE=docker-compose.staging.yml
      - DOCKER_COMPOSE_CMD=docker compose
      - DOCKER_COMPOSE_FILE_PROD=docker-compose.prod.yml
      - DOCKER_COMPOSE_FILE_STAGING=docker-compose.staging.yml
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/root/.docker/config.json:ro
    networks:
      - acctrenewal-network

networks:
  acctrenewal-network:
    driver: bridge

volumes:
  logs:
    driver: local
